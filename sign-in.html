<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sign-In - Footerly</title>
<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
.reveal {
    opacity: 0;
    transform: translateY(15px);
    transition: all 0.25s ease-out;
}

.reveal.show {
    opacity: 1;
    transform: translateY(0);
}

.msg {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
}

.msg.error {
    color: #ff4d4d;
}

.msg.success {
    color: #4CAF50;
}
</style>

</head>
<body>

<header class="reveal">
    <div class="logo reveal">Footerly</div>

    <nav>
        <a href="index.html" class="btn reveal">Footerly</a>
        <a href="login.html" class="btn reveal">Login</a>
    </nav>
</header>

<div class="auth-container reveal">
    <h2 class="reveal">Criar Conta</h2>

    <form id="cadastroForm">
        <input type="text" id="usuario" placeholder="Usuário" required class="reveal">
        <input type="email" id="email" placeholder="Email" required class="reveal">
        <input type="password" id="senha" placeholder="Senha" required class="reveal">
        <input type="text" id="cpf" placeholder="CPF/CNPJ" required class="reveal">

        <button type="submit" class="btn reveal">Criar Conta</button>

        <div id="mensagem" class="msg reveal"></div>
    </form>
</div>

<footer class="footer reveal">
    <div class="footer-container">

        <div class="footer-logo reveal">
            <h2>Footerly</h2>
            <p>
                Transformando rodapés em experiências estratégicas e funcionais para sites de todos os segmentos.
            </p>
        </div>

        <div class="footer-social">
            <a href="https://www.instagram.com/wluvviie/" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.youtube.com/@luwiie9411" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://wa.me/5581984016083" target="_blank">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="mailto:luanvieira150504@gmail.com">
                <i class="fas fa-envelope"></i>
            </a>
        </div>

    </div>

    <div class="footer-bottom">
        <p>© 2026 Footerly - Todos os direitos reservados</p>
    </div>
</footer>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
// animação
window.addEventListener("load", () => {
    const elementos = document.querySelectorAll(".reveal");

    elementos.forEach((el, index) => {
        setTimeout(() => {
            el.classList.add("show");
        }, index * 20);
    });
});

// cadastro
document.getElementById("cadastroForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const usuario = document.getElementById("usuario").value.trim();
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const cpf = document.getElementById("cpf").value.trim();
    const msg = document.getElementById("mensagem");

    msg.textContent = "";
    msg.className = "msg";

    // validação
    if (!usuario || !email || !senha || !cpf) {
        msg.textContent = "Preencha todos os campos.";
        msg.classList.add("error");
        return;
    }

    if (senha.length < 4) {
        msg.textContent = "A senha deve ter pelo menos 4 caracteres.";
        msg.classList.add("error");
        return;
    }

    // verifica se já existe usuário
    const emailSalvo = localStorage.getItem("email");

    if (email === emailSalvo) {
        msg.textContent = "Este email já está cadastrado.";
        msg.classList.add("error");
        return;
    }

    // salva dados
    localStorage.setItem("usuario", usuario);
    localStorage.setItem("email", email);
    localStorage.setItem("senha", senha);
    localStorage.setItem("cpf", cpf);

    msg.textContent = "Conta criada com sucesso!";
    msg.classList.add("success");

    // cria sessão automaticamente
    localStorage.setItem("logado", "true");

    // redireciona para home
    setTimeout(() => {
        window.location.href = "home.html";
    }, 1200);
});
</script>

</body>
</html>
