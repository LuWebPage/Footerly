<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - Footerly</title>
<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" sizes="32x32" href="logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
.reveal {
    opacity: 0;
    transform: translateY(15px);
    transition: all 0.25s ease-out;
}

.reveal.show {
    opacity: 1;
    transform: translateY(0);
}

.msg {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
}

.msg.error {
    color: #ff4d4d;
}

.msg.success {
    color: #4CAF50;
}
</style>
</head>

<body>

<header class="reveal">
    <div class="logo reveal">Footerly</div>

    <nav>
        <a href="index.html" class="btn reveal">Footerly</a>
        <a href="sign-in.html" class="btn reveal">Sign-In</a>
    </nav>
</header>

<div class="auth-container reveal">
    <h2 class="reveal">Login</h2>

    <form id="loginForm">
        <input type="text" id="user" placeholder="Usuário ou Email" required class="reveal">
        <input type="password" id="senha" placeholder="Senha" required class="reveal">
        
        <button type="submit" class="btn reveal">Login</button>

        <div id="mensagem" class="msg reveal"></div>

        <div class="auth-links reveal">
            <a href="esqueci.html">Esqueci a senha</a>
            <a href="sign-in.html">Cadastre-se</a> 
        </div> 
    </form>
</div>

<footer class="footer reveal">
    <div class="footer-container">

        <div class="footer-logo reveal">
            <h2>Footerly</h2>
            <p>
                Transformando rodapés em experiências estratégicas e funcionais para sites de todos os segmentos.
            </p>
        </div>

        <div class="footer-social">
            <a href="https://www.instagram.com/wluvviie/" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.youtube.com/@luwiie9411" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://wa.me/5581984016083" target="_blank">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="mailto:luanvieira150504@gmail.com">
                <i class="fas fa-envelope"></i>
            </a>
        </div>

    </div>

    <div class="footer-bottom">
        <p>© 2026 Footerly - Todos os direitos reservados</p>
    </div>
</footer>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script>
// animação
window.addEventListener("load", () => {
    const elementos = document.querySelectorAll(".reveal");

    elementos.forEach((el, index) => {
        setTimeout(() => {
            el.classList.add("show");
        }, index * 20);
    });
});

// login
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const user = document.getElementById("user").value.trim();
    const senha = document.getElementById("senha").value.trim();
    const msg = document.getElementById("mensagem");

    msg.textContent = "";
    msg.className = "msg";

    if (!user || !senha) {
        msg.textContent = "Preencha todos os campos.";
        msg.classList.add("error");
        return;
    }

    const usuarioSalvo = localStorage.getItem("usuario");
    const emailSalvo = localStorage.getItem("email");
    const senhaSalva = localStorage.getItem("senha");

    // 🔥 NOVO: verifica se existe cadastro
    if (!usuarioSalvo || !emailSalvo || !senhaSalva) {
        msg.textContent = "Nenhuma conta encontrada. Cadastre-se primeiro.";
        msg.classList.add("error");
        return;
    }

    // valida login
    if ((user === usuarioSalvo || user === emailSalvo) && senha === senhaSalva) {
        msg.textContent = "Login realizado com sucesso!";
        msg.classList.add("success");

        localStorage.setItem("logado", "true");

        setTimeout(() => {
            window.location.href = "home.html";
        }, 1000);
    } else {
        msg.textContent = "Usuário, email ou senha incorretos.";
        msg.classList.add("error");
    }
});
</script>

</body>
</html>
